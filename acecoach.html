<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AceCoach — AI Tennis Coach</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a1a0f; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(184,224,58,0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    const SYSTEM_PROMPT = `You are AceCoach, an expert AI tennis coach with 20+ years of experience coaching recreational players from beginner to advanced club level.
Your personality: encouraging, precise, practical. You speak like a seasoned coach on a courtside bench — direct, warm, knowledgeable.
You help players with technique problems, practice routines, mental game, match strategy, rules, gear advice, and drills.
Always ask follow-up questions to personalize advice. Keep responses focused and actionable. Use short paragraphs. Never be vague — give specific, concrete tips.`;

    const FREE_MESSAGES = 5;
    const STRIPE_URL = "https://buy.stripe.com/your_link_here";

    const suggestedQuestions = [
      "Why does my backhand keep going into the net?",
      "Build me a weekly practice plan",
      "How do I add more power to my serve?",
      "Tips for playing against a pusher",
      "How should I warm up before a match?",
    ];

    const S = {
      bg: "#0a1a0f", green: "#b8e03a", greenDim: "#5a8a4a",
      greenFaint: "rgba(184,224,58,0.07)", greenBorder: "rgba(184,224,58,0.2)",
      text: "#c8d8a8", textDim: "#7a9a6a",
    };

    async function callAPI(messages) {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'API error');
      return data.content?.[0]?.text || "Sorry, I couldn't get a response.";
    }

    function EmailScreen({ onSubmit }) {
      const [email, setEmail] = React.useState("");
      const [name, setName] = React.useState("");
      const [error, setError] = React.useState("");

      const handleSubmit = () => {
        if (!name.trim()) return setError("Please enter your name.");
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setError("Please enter a valid email.");
        setError("");
        onSubmit({ name: name.trim(), email: email.trim() });
      };

      return (
        <div style={{ minHeight:"100vh", background:S.bg, backgroundImage:`radial-gradient(ellipse at 20% 50%, rgba(16,80,30,0.4) 0%, transparent 60%)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"Georgia,serif", padding:24 }}>
          <div style={{ width:"100%", maxWidth:420 }}>
            <div style={{ textAlign:"center", marginBottom:40 }}>
              <div style={{ width:64, height:64, borderRadius:"50%", background:"linear-gradient(135deg, #b8e03a, #6ab04c)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, margin:"0 auto 14px", boxShadow:"0 0 30px rgba(184,224,58,0.3)" }}>🎾</div>
              <div style={{ color:S.green, fontSize:28, fontWeight:"bold" }}>AceCoach</div>
              <div style={{ color:S.greenDim, fontSize:12, letterSpacing:"0.14em", textTransform:"uppercase", marginTop:4 }}>AI Tennis Coach</div>
            </div>
            <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(184,224,58,0.15)", borderRadius:20, padding:"32px 28px" }}>
              <h2 style={{ color:"#d8f090", fontSize:20, marginBottom:8, fontWeight:"normal" }}>Get 5 free coaching sessions</h2>
              <p style={{ color:S.textDim, fontSize:14, lineHeight:1.6, marginBottom:28 }}>Enter your details to start. No credit card needed.</p>
              <div style={{ marginBottom:16 }}>
                <label style={{ color:S.greenDim, fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Your name</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Alex" onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
                  style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(184,224,58,0.2)", borderRadius:10, padding:"12px 14px", color:S.text, fontSize:14, fontFamily:"Georgia,serif", outline:"none" }} />
              </div>
              <div style={{ marginBottom:24 }}>
                <label style={{ color:S.greenDim, fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Email address</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
                  style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(184,224,58,0.2)", borderRadius:10, padding:"12px 14px", color:S.text, fontSize:14, fontFamily:"Georgia,serif", outline:"none" }} />
              </div>
              {error && <p style={{ color:"#ff7a6a", fontSize:13, marginBottom:16 }}>{error}</p>}
              <button onClick={handleSubmit} style={{ width:"100%", background:"linear-gradient(135deg, #b8e03a, #7aba3a)", border:"none", borderRadius:12, padding:14, color:"#0a1a0f", fontSize:15, fontWeight:"bold", fontFamily:"Georgia,serif", cursor:"pointer" }}>
                Start Free Trial →
              </button>
              <p style={{ color:"#3a6a2a", fontSize:12, textAlign:"center", marginTop:14 }}>5 free messages · No spam · Unsubscribe anytime</p>
            </div>
          </div>
        </div>
      );
    }

    function PaywallScreen({ name }) {
      const features = ["Unlimited coaching messages","Personalized practice plans","Match strategy & mental game","Technique breakdowns","Cancel anytime"];
      return (
        <div style={{ minHeight:"100vh", background:S.bg, backgroundImage:`radial-gradient(ellipse at 50% 30%, rgba(16,80,30,0.5) 0%, transparent 60%)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"Georgia,serif", padding:24 }}>
          <div style={{ width:"100%", maxWidth:420, textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>🏆</div>
            <h2 style={{ color:"#d8f090", fontSize:22, marginBottom:10, fontWeight:"normal" }}>You've used your 5 free sessions, {name}!</h2>
            <p style={{ color:S.textDim, fontSize:15, lineHeight:1.7, marginBottom:32 }}>Unlock unlimited coaching, drill plans, and match strategy.</p>
            <div style={{ background:"rgba(184,224,58,0.06)", border:"1px solid rgba(184,224,58,0.25)", borderRadius:20, padding:"28px 24px", marginBottom:16 }}>
              <div style={{ color:S.greenDim, fontSize:11, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:10 }}>AceCoach Pro</div>
              <div style={{ display:"flex", alignItems:"baseline", justifyContent:"center", gap:4, marginBottom:20 }}>
                <span style={{ color:S.green, fontSize:44, fontWeight:"bold" }}>$8</span>
                <span style={{ color:S.textDim, fontSize:16 }}>/month</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:24, textAlign:"left" }}>
                {features.map((f,i)=>(
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:18, height:18, borderRadius:"50%", background:"rgba(184,224,58,0.15)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5L3.8 7.5L8.5 2.5" stroke="#b8e03a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
                    </div>
                    <span style={{ color:"#b0c890", fontSize:14 }}>{f}</span>
                  </div>
                ))}
              </div>
              <a href={STRIPE_URL} target="_blank" rel="noreferrer" style={{ display:"block", background:"linear-gradient(135deg, #b8e03a, #7aba3a)", borderRadius:12, padding:14, color:"#0a1a0f", fontSize:15, fontWeight:"bold", textDecoration:"none" }}>
                Unlock Unlimited Access →
              </a>
            </div>
            <p style={{ color:"#3a6a2a", fontSize:12 }}>Secure payment via Stripe · Cancel anytime</p>
          </div>
        </div>
      );
    }

    function ChatScreen({ user, onPaywall }) {
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const [started, setStarted] = React.useState(false);
      const [msgCount, setMsgCount] = React.useState(0);
      const bottomRef = React.useRef(null);

      React.useEffect(()=>{ bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

      const sendMessage = async (text) => {
        const userText = text || input.trim();
        if (!userText || loading) return;
        if (msgCount >= FREE_MESSAGES) return onPaywall();
        setInput(""); setStarted(true);
        const newMessages = [...messages, { role:"user", content:userText }];
        setMessages(newMessages); setLoading(true);
        try {
          const reply = await callAPI(newMessages);
          const newCount = msgCount + 1;
          setMsgCount(newCount);
          setMessages([...newMessages, { role:"assistant", content:reply }]);
          if (newCount >= FREE_MESSAGES) setTimeout(onPaywall, 2200);
        } catch(err) {
          setMessages([...newMessages, { role:"assistant", content:`Error: ${err.message}` }]);
        }
        setLoading(false);
      };

      const remaining = FREE_MESSAGES - msgCount;
      const low = remaining <= 2;

      return (
        <div style={{ minHeight:"100vh", background:S.bg, backgroundImage:`radial-gradient(ellipse at 20% 50%, rgba(16,80,30,0.4) 0%, transparent 60%)`, fontFamily:"Georgia,serif", display:"flex", flexDirection:"column", alignItems:"center" }}>
          <div style={{ width:"100%", maxWidth:720, padding:"20px 24px 0", display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:"50%", background:"linear-gradient(135deg, #b8e03a, #6ab04c)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0, boxShadow:"0 0 20px rgba(184,224,58,0.3)" }}>🎾</div>
            <div>
              <div style={{ color:S.green, fontSize:20, fontWeight:"bold" }}>AceCoach</div>
              <div style={{ color:S.greenDim, fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase" }}>AI Tennis Coach</div>
            </div>
            <div style={{ marginLeft:"auto" }}>
              <div style={{ background:low?"rgba(255,120,60,0.12)":S.greenFaint, border:`1px solid ${low?"rgba(255,120,60,0.3)":S.greenBorder}`, borderRadius:20, padding:"4px 12px" }}>
                <span style={{ color:low?"#ff9060":S.green, fontSize:12 }}>{remaining} free {remaining===1?"session":"sessions"} left</span>
              </div>
            </div>
          </div>

          <div style={{ width:"100%", maxWidth:720, flex:1, padding:"20px 24px 0", display:"flex", flexDirection:"column", minHeight:"calc(100vh - 160px)" }}>
            {!started && (
              <div style={{ marginBottom:24 }}>
                <div style={{ background:"rgba(184,224,58,0.06)", border:"1px solid rgba(184,224,58,0.15)", borderRadius:16, padding:22, marginBottom:18 }}>
                  <p style={{ color:"#c8d8b0", fontSize:15, lineHeight:1.7 }}>
                    👋 Hey {user.name}! I'm your personal tennis coach. Struggling with your serve, need a practice plan, or want to build a smarter game strategy? I've got you.<br/><br/>
                    <span style={{ color:"#7aaa5a" }}>What do you want to work on today?</span>
                  </p>
                </div>
                <p style={{ color:"#4a7a3a", fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>Try asking</p>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {suggestedQuestions.map((q,i)=>(
                    <button key={i} onClick={()=>sendMessage(q)} style={{ background:S.greenFaint, border:`1px solid ${S.greenBorder}`, borderRadius:20, color:"#9aca6a", fontSize:13, padding:"7px 13px", cursor:"pointer", fontFamily:"Georgia,serif" }}>{q}</button>
                  ))}
                </div>
              </div>
            )}

            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {messages.map((msg,i)=>(
                <div key={i} style={{ display:"flex", justifyContent:msg.role==="user"?"flex-end":"flex-start" }}>
                  {msg.role==="assistant" && <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg, #b8e03a, #6ab04c)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0, marginRight:9, marginTop:4 }}>🎾</div>}
                  <div style={{ maxWidth:"78%", padding:"11px 15px", borderRadius:msg.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px", background:msg.role==="user"?"linear-gradient(135deg, #2a5a1a, #1e4a14)":"rgba(255,255,255,0.05)", border:msg.role==="user"?"1px solid rgba(184,224,58,0.25)":"1px solid rgba(255,255,255,0.08)", color:msg.role==="user"?"#d0f080":"#c0d8a0", fontSize:14.5, lineHeight:1.7, whiteSpace:"pre-wrap" }}>
                    {msg.content}
                  </div>
                </div>
              ))}
              {loading && (
                <div style={{ display:"flex", alignItems:"flex-start", gap:9 }}>
                  <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg, #b8e03a, #6ab04c)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>🎾</div>
                  <div style={{ padding:"11px 16px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"18px 18px 18px 4px", display:"flex", gap:5, alignItems:"center" }}>
                    {[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:S.green, animation:"bounce 1.2s infinite", animationDelay:`${i*0.2}s`, opacity:0.7 }} />)}
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>
          </div>

          <div style={{ width:"100%", maxWidth:720, padding:"16px 24px 24px", position:"sticky", bottom:0, background:"linear-gradient(to top, #0a1a0f 70%, transparent)" }}>
            <div style={{ display:"flex", gap:9, background:"rgba(255,255,255,0.05)", border:`1px solid ${S.greenBorder}`, borderRadius:13, padding:"7px 7px 7px 15px" }}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} }}
                placeholder="Ask your coach anything..." rows={1}
                style={{ flex:1, background:"transparent", border:"none", outline:"none", color:S.text, fontSize:14.5, fontFamily:"Georgia,serif", resize:"none", lineHeight:1.5, paddingTop:5, paddingBottom:5 }} />
              <button onClick={()=>sendMessage()} disabled={!input.trim()||loading}
                style={{ background:input.trim()&&!loading?"linear-gradient(135deg, #b8e03a, #7aba3a)":"rgba(184,224,58,0.1)", border:"none", borderRadius:9, width:36, height:36, cursor:input.trim()&&!loading?"pointer":"default", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, alignSelf:"flex-end" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <path d="M22 2L11 13" stroke={input.trim()&&!loading?"#0a1a0f":"#4a7a3a"} strokeWidth="2.5" strokeLinecap="round"/>
                  <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke={input.trim()&&!loading?"#0a1a0f":"#4a7a3a"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
            <p style={{ color:"#2a4a22", fontSize:11, textAlign:"center", marginTop:8 }}>Press Enter to send · Shift+Enter for new line</p>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = React.useState("email");
      const [user, setUser] = React.useState(null);
      if (screen==="email") return <EmailScreen onSubmit={u=>{ setUser(u); setScreen("chat"); }} />;
      if (screen==="paywall") return <PaywallScreen name={user?.name||"there"} />;
      return <ChatScreen user={user} onPaywall={()=>setScreen("paywall")} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
