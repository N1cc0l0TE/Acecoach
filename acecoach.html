    // ── Grand Slam season detection ─────────────────────────────────────────
    function getSeason() {
      const now = new Date();
      const m = now.getMonth(); // 0=Jan
      const d = now.getDate();
      // Clay: April (3) – mid June (5, day < 15)
      if (m >= 3 && (m < 5 || (m === 5 && d < 15))) return "clay";
      // Grass: mid June – mid August (7, day < 15)
      if ((m === 5 && d >= 15) || m === 6 || (m === 7 && d < 15)) return "grass";
      // Hard: mid August – March
      return "hard";
    }

        try{
          const {text:reply, videoQuery} = await callAPI(newMsgs);
          const nc=msgCount+1; setMsgCount(nc);
          setMessages([...newMsgs,{role:"assistant",content:reply,videoQuery}]);
          if(nc>=FREE_MESSAGES) setTimeout(onPaywall,2200);
        }catch(err){
          setMessages([...newMsgs,{role:"assistant",content:`Error: ${err.message}`}]);
        }
        setLoading(false);
      };

      const rem=FREE_MESSAGES-msgCount;
      const low=rem<=2;
      const suggested=SUGGESTED[lang]||SUGGESTED.en;
      const welcome=(WELCOME[lang]||WELCOME.en)("");

      return(
        <div style={{minHeight:"100vh",background:t.bg,backgroundImage:t.bgGrad,fontFamily:"Georgia,serif",display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
          <SeasonalDecor t={t}/>

          {/* Header */}
          <div style={{width:"100%",maxWidth:720,padding:"18px 24px 0",display:"flex",alignItems:"center",gap:12,position:"relative",zIndex:1}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg, ${t.accent}, ${t.accentDim})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,boxShadow:`0 0 18px ${t.accentGlow}`}}>🎾</div>
            <div>
              <div style={{color:t.accent,fontSize:20,fontWeight:"bold"}}>AceCoach</div>
              <div style={{color:t.accentDim,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase"}}>{langObj.flag} {langObj.label}</div>
            </div>
            <div style={{marginLeft:"auto"}}>
              <div style={{background:low?"rgba(255,100,60,0.12)":t.accentFaint,border:`1px solid ${low?"rgba(255,100,60,0.3)":t.accentBorder}`,borderRadius:20,padding:"4px 12px"}}>
                <span style={{color:low?"#ff9060":t.accent,fontSize:12}}>{rem} free {rem===1?"session":"sessions"} left</span>
              </div>
            </div>
          </div>

          {/* Chat */}
          <div style={{width:"100%",maxWidth:720,flex:1,padding:"18px 24px 0",display:"flex",flexDirection:"column",minHeight:"calc(100vh - 155px)",position:"relative",zIndex:1}}>
            {!started&&(
              <div style={{marginBottom:22}}>
                <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${t.accentBorder}`,borderRadius:16,padding:22,marginBottom:16,backdropFilter:"blur(6px)"}}>
                  <p style={{color:t.text,fontSize:15,lineHeight:1.75}}>{welcome}</p>
                </div>
                <p style={{color:t.accentDim,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Try asking</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {suggested.map((q,i)=>(
                    <button key={i} onClick={()=>send(q)} style={{background:t.accentFaint,border:`1px solid ${t.accentBorder}`,borderRadius:20,color:t.accent,fontSize:13,padding:"7px 13px",cursor:"pointer",fontFamily:"Georgia,serif",opacity:0.85}}>{q}</button>
                  ))}
                </div>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {messages.map((msg,i)=>(
                <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                  {msg.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg, ${t.accent}, ${t.accentDim})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginRight:9,marginTop:4}}>🎾</div>}
                  <div style={{maxWidth:"78%",padding:"11px 15px",borderRadius:msg.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:msg.role==="user"?t.userBubble:"rgba(255,255,255,0.05)",border:`1px solid ${msg.role==="user"?t.userBubbleBorder:"rgba(255,255,255,0.08)"}`,color:msg.role==="user"?t.userText:t.text,fontSize:14.5,lineHeight:1.75,whiteSpace:"pre-wrap"}}>
                    {msg.content}
                    {msg.role==="assistant"&&<VideoButton videoQuery={msg.videoQuery}/>}
                  </div>
                </div>
              ))}
              {loading&&(
                <div style={{display:"flex",alignItems:"flex-start",gap:9}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg, ${t.accent}, ${t.accentDim})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🎾</div>
                  <div style={{padding:"11px 16px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"18px 18px 18px 4px",display:"flex",gap:5,alignItems:"center"}}>
                    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:t.accent,animation:"bounce 1.2s infinite",animationDelay:`${i*0.2}s`,opacity:0.7}}/>)}
                  </div>
                </div>
              )}
              <div ref={bottomRef}/>
            </div>
          </div>

          {/* Input */}
          <div style={{width:"100%",maxWidth:720,padding:"14px 24px 22px",position:"sticky",bottom:0,background:`linear-gradient(to top, ${t.bg} 65%, transparent)`,zIndex:1}}>
            <div style={{display:"flex",gap:9,background:"rgba(255,255,255,0.05)",border:`1px solid ${t.accentBorder}`,borderRadius:13,padding:"7px 7px 7px 15px",backdropFilter:"blur(6px)"}}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
                placeholder={langObj.placeholder} rows={1}
                dir={lang==="ar"?"rtl":"ltr"}
                style={{flex:1,background:"transparent",border:"none",outline:"none",color:t.text,fontSize:14.5,fontFamily:"Georgia,serif",resize:"none",lineHeight:1.5,paddingTop:5,paddingBottom:5}}/>
              <button onClick={()=>send()} disabled={!input.trim()||loading}
                style={{background:input.trim()&&!loading?`linear-gradient(135deg, ${t.accent}, ${t.accentDim})`:`${t.accentFaint}`,border:"none",borderRadius:9,width:36,height:36,cursor:input.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,alignSelf:"flex-end",boxShadow:input.trim()&&!loading?`0 2px 12px ${t.accentGlow}`:"none"}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <path d="M22 2L11 13" stroke={input.trim()&&!loading?t.btnText:t.accentDim} strokeWidth="2.5" strokeLinecap="round"/>
                  <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke={input.trim()&&!loading?t.btnText:t.accentDim} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          {/* Legal footer */}
          <div style={{textAlign:"center",paddingBottom:12,position:"relative",zIndex:1}}>
            <a href="/legal.html" target="_blank" style={{color:t.accentDim,fontSize:11,textDecoration:"none",opacity:0.5,marginRight:16}}>Privacy Policy</a>
            <a href="/legal.html" target="_blank" style={{color:t.accentDim,fontSize:11,textDecoration:"none",opacity:0.5,marginRight:16}}>Terms of Service</a>
            <a href="/legal.html" target="_blank" style={{color:t.accentDim,fontSize:11,textDecoration:"none",opacity:0.5}}>AI Disclaimer</a>
          </div>
        </div>
      );
    }

    function App() {
      const [screen,setScreen]=React.useState("email");
      const [user,setUser]=React.useState(null);
      const t = THEMES[getSeason()];
      if(screen==="email") return <EmailScreen onSubmit={u=>{setUser(u);setScreen("chat");}} t={t}/>;
      if(screen==="paywall") return <PaywallScreen name={user?.name||"there"} t={t}/>;
      return <ChatScreen user={user} onPaywall={()=>setScreen("paywall")} t={t}/>;
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
